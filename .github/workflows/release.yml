name: Release

# Cutting a release is just: push a vX.Y.Z tag. This builds the single-file
# dist and publishes a GitHub Release with k9s-lite.dist.sh attached - the same
# artifact CI already lints and smoke-tests on every commit, so no hand-built
# file is ever uploaded.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write        # create the release, push the pin-bump branch
  pull-requests: write   # open the README pin-bump PR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Guard against the classic footgun: tagging v0.12.0 while the source
      # still says K9L_VERSION="0.11.0". The version users see must match the tag.
      - name: verify tag matches K9L_VERSION
        run: |
          tag=${GITHUB_REF_NAME#v}
          src=$(sed -n 's/^K9L_VERSION="\(.*\)"/\1/p' k9s-lite.sh)
          echo "tag=$tag  K9L_VERSION=$src"
          if [[ "$tag" != "$src" ]]; then
            echo "::error::tag v$tag does not match K9L_VERSION=$src in k9s-lite.sh - bump the source and re-tag"
            exit 1
          fi

      - name: build single-file dist
        run: bash hack/build-dist.sh

      # A tagged commit that can't pass smoke shouldn't ship. Cheap re-run.
      - name: pty smoke test (dist build)
        run: bash hack/smoke.sh dist/k9s-lite.dist.sh

      - name: publish release with dist asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/k9s-lite.dist.sh \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      # Point the README install commands at the freshly released tag. Only the
      # two versioned `download/vX.Y.Z/` URLs change; the `latest/download/` one
      # has no version and is left alone.
      #
      # main is protected by a ruleset requiring a reviewed PR, and GitHub won't
      # let the Actions token bypass it on a personal (non-org) repo. So instead
      # of pushing to main, open a PR with the bump - the maintainer merges it
      # with one click (gh pr merge --admin), consistent with the gatekeeping
      # model. Idempotent: re-running the same tag finds nothing to change.
      - name: open PR to bump README install pins
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          git checkout -B "chore/pin-${GITHUB_REF_NAME}" origin/main
          sed -i -E "s#(releases/download/)v[0-9]+\.[0-9]+\.[0-9]+(/k9s-lite\.dist\.sh)#\1${GITHUB_REF_NAME}\2#g" README.md
          if git diff --quiet README.md; then
            echo "README pins already at ${GITHUB_REF_NAME}, no PR needed"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: pin README install commands to ${GITHUB_REF_NAME}"
          git push -f origin "chore/pin-${GITHUB_REF_NAME}"
          gh pr create \
            --base main \
            --head "chore/pin-${GITHUB_REF_NAME}" \
            --title "docs: pin README install commands to ${GITHUB_REF_NAME}" \
            --body "Automated by the release workflow after publishing ${GITHUB_REF_NAME}. Points the two versioned install URLs in the README at the new tag. Merge with \`--admin\`." \
            2>&1 || echo "PR may already exist for this tag; branch updated"
