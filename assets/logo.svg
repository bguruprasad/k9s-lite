<svg xmlns="http://www.w3.org/2000/svg" width="640" height="330" viewBox="0 0 640 330" role="img" aria-label="k9l — k9s, but lite">
  <!-- terminal window -->
  <rect x="20" y="20" width="600" height="290" rx="16" fill="#171a26" stroke="#2c3040" stroke-width="2"/>
  <!-- title bar -->
  <path d="M20 36 a16 16 0 0 1 16 -16 h568 a16 16 0 0 1 16 16 v30 h-600 z" fill="#22263a"/>
  <circle cx="48" cy="43" r="7" fill="#ff5f56"/>
  <circle cx="72" cy="43" r="7" fill="#ffbd2e"/>
  <circle cx="96" cy="43" r="7" fill="#27c93f"/>
  <text x="320" y="49" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="16" fill="#6272a4">k9s-lite.sh</text>

  <!-- paw print accent (nod to the k9s dog) -->
  <g fill="#ffb86c" opacity="0.9" transform="translate(500,150)">
    <ellipse cx="0" cy="8" rx="24" ry="19"/>
    <circle cx="-30" cy="-16" r="10"/>
    <circle cx="-11" cy="-28" r="10"/>
    <circle cx="11" cy="-28" r="10"/>
    <circle cx="30" cy="-16" r="10"/>
  </g>

  <!-- prompt -->
  <text x="80" y="200" font-family="Menlo, Consolas, monospace" font-size="100" font-weight="bold">
    <tspan fill="#ff79c6">&#10095;</tspan><tspan dx="18" fill="#8be9fd">k9</tspan><tspan fill="#f1fa8c">l</tspan>
  </text>
  <!-- block cursor -->
  <rect x="392" y="118" width="46" height="92" fill="#8be9fd" opacity="0.85"/>

  <!-- tagline -->
  <text x="320" y="266" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="26" fill="#6272a4">k9s, but lite</text>
</svg>
